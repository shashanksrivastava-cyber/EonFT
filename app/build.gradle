apply plugin: 'com.android.application'

android {
    signingConfigs {
        config {
            keyAlias 'fielddata'
            keyPassword 'fielddata'
            storeFile file('/home/androidpc/Downloads/fielddata.jks')
            storePassword 'fielddata'
        }
    }
    compileSdkVersion 27
    buildToolsVersion '27.0.1'
    defaultConfig {
        applicationId "in.eoninfotech.eontechnician"
        minSdkVersion 16
        targetSdkVersion 27
        versionCode 16 // total number of version changes on play store
        versionName "4.5"
        useLibrary 'org.apache.http.legacy'
        multiDexEnabled true
        vectorDrawables.useSupportLibrary = true
    }
    lintOptions {
        abortOnError false
    }
    buildTypes {
        release {
            minifyEnabled false
            multiDexEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.config
        }
    }
    compileOptions {
        targetCompatibility JavaVersion.VERSION_1_8
        sourceCompatibility JavaVersion.VERSION_1_8
    }
    dexOptions {
        javaMaxHeapSize "4g"
    }
}

dependencies {
    compile fileTree(include: ['*.jar'], dir: 'libs')
    compile 'com.android.support.constraint:constraint-layout:1.0.2'
    testCompile 'junit:junit:4.12'
    //noinspection GradleCompatible
    compile 'com.android.support:appcompat-v7:27.0.1'
    compile 'com.android.support:design:27.0.1'
    compile 'com.androidadvance:topsnackbar:1.0.0'
    compile 'com.android.support:support-v4:27.0.1'
    compile 'com.android.support:cardview-v7:27.0.1'
    compile 'com.android.support:recyclerview-v7:27.0.1'
    compile 'com.squareup.retrofit2:retrofit:2.3.0'
    compile 'com.squareup.retrofit2:converter-gson:2.3.0'
    compile 'com.squareup.okhttp3:logging-interceptor:3.5.0'
    compile 'pub.devrel:easypermissions:0.2.1'
    implementation 'de.hdodenhof:circleimageview:2.2.0'
    implementation 'pl.droidsonroids.gif:android-gif-drawable:1.2.15'
    implementation 'com.flaviofaria:kenburnsview:1.0.7'
    implementation 'com.github.bumptech.glide:glide:4.3.1'
    compile 'com.thefinestartist:finestwebview:1.2.7'
    compile 'org.jsoup:jsoup:1.10.2'
    compile 'com.github.HotBitmapGG:RingProgressBar:V1.2.3'
    compile 'pl.bclogic:pulsator4droid:1.0.3'
    compile 'com.cocosw:bottomsheet:1.+@aar'
    compile 'com.github.chrisbanes:PhotoView:2.1.3'
    compile 'com.vatsal.imagezoomer:image-zoomer:1.0.2'
    compile 'com.android.support:palette-v7:27.0.1'
    compile 'com.prolificinteractive:material-calendarview:1.4.3'
    implementation 'com.google.android.gms:play-services:12.0.1'
    implementation 'com.google.android.gms:play-services-places:12.0.1'
    implementation 'com.google.android.gms:play-services-location:12.0.1'
    compile 'com.webianks.library:popup-bubble:1.0.5'
    implementation 'com.facebook.shimmer:shimmer:0.1.0@aar'
    implementation 'com.github.d-max:spots-dialog:0.4@aar'
    compile 'com.github.lzyzsd:circleprogress:1.2.1'
    compile 'com.timqi.sectorprogressview:library:2.0.1'

}
